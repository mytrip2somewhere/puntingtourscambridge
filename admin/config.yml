# Sveltia CMS - images + blog (Phase 8.3).
# Content managers get two things: a "Site images" screen with a labelled picker +
# alt-text field per slot, and a "Blog posts" collection (write the body, set a hero,
# pick a related tour). Money-page text/prices/schema stay in code. Commits auto-deploy.

backend:
  name: github
  repo: mytrip2somewhere/puntingtourscambridge
  branch: main
  # Sveltia OAuth worker for GitHub sign-in.
  # NOTE FOR OLEG: deploy a sveltia-cms-auth worker (GitHub OAuth app) for this site and
  # put its URL here, or reuse an existing worker that allows this repo.
  base_url: https://sveltia-cms-auth.mytrip2somewhere.workers.dev

# Where uploaded files are committed, and how they resolve on the live site.
media_folder: "src/public/images/uploaded"
public_folder: "/images/uploaded"

collections:
  - name: site_images
    label: "Site images"
    description: "Replace the photos shown across the site. Slots are grouped by page; each tells you where it appears and the best shape to upload. Tour and Cambridge photography only (never AI-generated)."
    files:
      - name: images
        label: "All site images"
        file: "src/data/images.json"
        description: "Open a section, open a slot, upload the photo and write its alt text. Heroes are wide (16:9), cards are 4:3, Jordan's photos are square. Alt text describes the photo for Google and screen readers, kept natural and including a keyword like 'Cambridge punting' where it fits."
        fields:
          - name: homepage
            label: "🏠 Homepage"
            widget: object
            fields:
              - name: home_hero
                label: "Hero banner (very top of the homepage)"
                widget: object
                hint: "The big banner visitors see first. Wide 16:9, ~1600x900px. Page: /"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (describe it, include a keyword)", widget: string, required: true }
              - name: jordan_thumb
                label: "Jordan — small round photo (square)"
                widget: object
                hint: "Shown next to Jordan's name across the site. ~160x160px."
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: shared_card
                label: "Shared tour — card photo (4:3)"
                widget: object
                hint: "Card on the homepage and tours page. Page: /tours/cambridge-shared-punting-tour/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: private_card
                label: "Private tour — card photo (4:3)"
                widget: object
                hint: "Card on the homepage and tours page. Page: /tours/private-cambridge-punting-tour/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: student_card
                label: "Student tour — card photo (4:3)"
                widget: object
                hint: "Card on the homepage and tours page. Page: /tours/cambridge-student-guided-punting/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
          - name: tours
            label: "⛵ Tour pages"
            widget: object
            fields:
              - name: tours_hub_hero
                label: "Tours page — hero banner (16:9)"
                widget: object
                hint: "Top banner on the 'all tours' page. Page: /tours/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: shared_hero
                label: "Shared tour — hero banner (16:9)"
                widget: object
                hint: "Top banner on the shared tour page. Page: /tours/cambridge-shared-punting-tour/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: private_hero
                label: "Private tour — hero banner (16:9)"
                widget: object
                hint: "Top banner on the private tour page. Page: /tours/private-cambridge-punting-tour/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: student_hero
                label: "Student tour — hero banner (16:9)"
                widget: object
                hint: "Top banner on the student-guided tour page. Page: /tours/cambridge-student-guided-punting/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
          - name: guides
            label: "📖 Guides"
            widget: object
            fields:
              - name: guides_hub_hero
                label: "Guides page — hero banner (16:9)"
                widget: object
                hint: "Top banner on the Guides page. Page: /guides/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: prices_hero
                label: "Prices guide — hero banner (16:9)"
                widget: object
                hint: "Top banner on the punting prices guide. Page: /guides/cambridge-punting-prices/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: backs_hero
                label: "College Backs guide — hero banner (16:9)"
                widget: object
                hint: "Top banner on the College Backs guide. Page: /guides/cambridge-college-backs/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: stations_hero
                label: "Where to punt guide — hero banner (16:9)"
                widget: object
                hint: "Top banner on the punting stations guide. Best shot: punts moored at a station (Quayside or Mill Pond). Page: /guides/where-to-punt-cambridge/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: cambridge_hero
                label: "Is Cambridge worth visiting — hero banner (16:9)"
                widget: object
                hint: "Top banner on the Cambridge city guide. Best shot: King's College Chapel or the Cambridge skyline. Page: /guides/is-cambridge-worth-visiting/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: what_is_punting_hero
                label: "What is punting — hero banner (16:9)"
                widget: object
                hint: "Top banner on the what-is-punting guide. Best shot: a chauffeur poling a punt, showing the pole. Page: /guides/what-is-punting/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
              - name: best_time_hero
                label: "Best time to visit Cambridge — hero banner (16:9)"
                widget: object
                hint: "Top banner on the best-time-to-visit guide. Best shot: the Backs in strong seasonal light. Page: /guides/best-time-to-visit-cambridge/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }
          - name: author
            label: "👤 Author (Jordan)"
            widget: object
            fields:
              - name: jordan_portrait
                label: "Jordan — large portrait, About page (square)"
                widget: object
                hint: "Larger portrait on the About page. ~600x600px. Page: /about/"
                fields:
                  - { name: src, label: "Photo", widget: image }
                  - { name: alt, label: "Alt text (include a keyword)", widget: string, required: true }

  # Blog: full posts. Managers write the body in a rich editor and can insert images
  # anywhere. Each post can point at a tour for the conversion call-to-action.
  - name: blog
    label: "Blog posts"
    label_singular: "Blog post"
    folder: "src/content/blog"
    extension: md
    format: frontmatter
    create: true
    slug: "{{slug}}"
    media_folder: "/src/public/images/uploaded/blog"
    public_folder: "/images/uploaded/blog"
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: date, label: "Date", widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { name: description, label: "Excerpt / meta description", widget: text }
      - { name: hero, label: "Hero image", widget: image, required: false }
      - { name: hero_alt, label: "Hero image alt text", widget: string, required: false }
      - name: related_tour
        label: "Related tour (conversion CTA)"
        widget: select
        required: false
        options:
          - { label: "Cambridge Shared Punting Tour", value: "cambridge-shared-punting-tour" }
          - { label: "Private Cambridge Punting Tour", value: "private-cambridge-punting-tour" }
          - { label: "Cambridge Student-Guided Shared Punting", value: "cambridge-student-guided-punting" }
      - { name: related_tour_label, label: "CTA tour label (e.g. Cambridge Shared Punting Tour)", widget: string, required: false }
      - { name: related_tour_blurb, label: "CTA blurb", widget: text, required: false }
      - { name: draft, label: "Draft (uncheck to publish)", widget: boolean, default: true, required: false }
      - { name: body, label: "Body", widget: markdown }
