name: Deploy to Cloudflare Pages

# Auto-deploy on every push to main (includes Sveltia CMS image/post commits).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # PRE-LAUNCH: site ships noindex while images are placeholders and the domain/GA
      # are not wired. AT LAUNCH, flip this back to `SITE_INDEXABLE=true npm run build`.
      - run: npm run build
      # Create the Pages project on first deploy (wrangler `pages deploy` does NOT
      # auto-create it in CI). Idempotent: a no-op once the project exists.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3 pages project create punting-tours-cambridge --production-branch=main || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=punting-tours-cambridge --branch=main
