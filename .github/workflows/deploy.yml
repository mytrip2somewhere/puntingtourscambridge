name: Deploy to Cloudflare Pages

# Auto-deploy on every push to main (includes Sveltia CMS image/post commits).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # PRE-LAUNCH: site ships noindex while images are placeholders and the domain/GA
      # are not wired. AT LAUNCH, flip this back to `SITE_INDEXABLE=true npm run build`.
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=punting-tours-cambridge --branch=main
