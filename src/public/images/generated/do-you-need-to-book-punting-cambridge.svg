<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" role="img" aria-label="A decision flow for whether to book a Cambridge punting tour ahead or just turn up. Start, then ask: is it summer, a weekend, or an evening? If yes, book ahead to lock your slot and see the live price. If no, ask: is it a quiet off-peak weekday? If yes, it is usually fine to turn up at a station. If you are unsure, booking ahead is the safe bet. Cambridge has six licensed punting stations.">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#433d38"/>
    </marker>
    <style>
      .ttl{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:800;fill:#14110f}
      .h{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:700;fill:#14110f}
      .b{font-family:ui-sans-serif,system-ui,Arial,sans-serif;fill:#433d38}
      .lab{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:700;fill:#433d38}
      .wh{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:800;fill:#ffffff}
      .ws{font-family:ui-sans-serif,system-ui,Arial,sans-serif;fill:#ffffff}
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="470" rx="16" fill="#f7f4ef"/>
  <text x="40" y="44" class="ttl" font-size="25">Book ahead, or just turn up?</text>
  <text x="40" y="66" class="b" font-size="13.5">A quick decision flow for Cambridge punting tours</text>

  <!-- START node -->
  <rect x="40" y="96" width="150" height="48" rx="24" fill="#14110f"/>
  <text x="115" y="126" text-anchor="middle" class="wh" font-size="16">Start here</text>

  <!-- Q1 -->
  <path d="M190 120 L228 120" fill="none" stroke="#433d38" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="234" y="92" width="300" height="56" rx="12" fill="#ffffff" stroke="#e0d8cc"/>
  <text x="384" y="116" text-anchor="middle" class="h" font-size="14.5">Summer, a weekend, or evening?</text>
  <text x="384" y="135" text-anchor="middle" class="b" font-size="12">peak times, when stations get busy</text>

  <!-- Q1 YES -> gold box (down-right) -->
  <path d="M534 120 L640 120" fill="none" stroke="#433d38" stroke-width="2" marker-end="url(#arr)"/>
  <text x="585" y="110" text-anchor="middle" class="lab" font-size="12">YES</text>
  <rect x="646" y="86" width="214" height="68" rx="12" fill="#e8a33d"/>
  <text x="753" y="113" text-anchor="middle" class="wh" font-size="14.5">Book ahead</text>
  <text x="753" y="133" text-anchor="middle" class="ws" font-size="11.5">lock your slot, see the live price</text>

  <!-- Q1 NO -> down to Q2 -->
  <path d="M384 148 L384 196" fill="none" stroke="#433d38" stroke-width="2" marker-end="url(#arr)"/>
  <text x="400" y="176" text-anchor="middle" class="lab" font-size="12">NO</text>

  <!-- Q2 -->
  <rect x="234" y="200" width="300" height="56" rx="12" fill="#ffffff" stroke="#e0d8cc"/>
  <text x="384" y="224" text-anchor="middle" class="h" font-size="14.5">Quiet off-peak weekday?</text>
  <text x="384" y="243" text-anchor="middle" class="b" font-size="12">a calm morning out of high season</text>

  <!-- Q2 YES -> green box (right) -->
  <path d="M534 228 L640 228" fill="none" stroke="#433d38" stroke-width="2" marker-end="url(#arr)"/>
  <text x="585" y="218" text-anchor="middle" class="lab" font-size="12">YES</text>
  <rect x="646" y="194" width="214" height="68" rx="12" fill="#2f6f57"/>
  <text x="753" y="221" text-anchor="middle" class="wh" font-size="14">Usually fine to turn up</text>
  <text x="753" y="241" text-anchor="middle" class="ws" font-size="11.5">walk straight to a station</text>

  <!-- Q2 UNSURE -> down to muted box -->
  <path d="M384 256 L384 300" fill="none" stroke="#433d38" stroke-width="2" marker-end="url(#arr)"/>
  <text x="412" y="282" text-anchor="middle" class="lab" font-size="12">UNSURE</text>

  <!-- muted safe-bet box -->
  <rect x="234" y="304" width="300" height="60" rx="12" fill="#214f3e"/>
  <text x="384" y="330" text-anchor="middle" class="wh" font-size="14.5">Booking ahead is the safe bet</text>
  <text x="384" y="350" text-anchor="middle" class="ws" font-size="11.5">no slot, no price surprise on arrival</text>

  <!-- footer note -->
  <rect x="40" y="404" width="820" height="44" rx="12" fill="#2f6f57"/>
  <text x="450" y="431" text-anchor="middle" class="wh" font-size="14">Cambridge has six licensed punting stations.</text>
</svg>
