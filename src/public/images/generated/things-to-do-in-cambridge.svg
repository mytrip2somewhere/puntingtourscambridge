<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-label="A stylized map of Cambridge highlights in one visit: King's College Chapel, the College Backs (the standout, only reachable by punt, shown in gold), the Fitzwilliam Museum, the Market Square, Great St Mary's tower, and the Botanic Garden. A soft River Cam winds through the panel and a dashed walking route links the sights.">
  <defs>
    <style>
      .t{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:800;fill:#14110f}
      .sub{font-family:ui-sans-serif,system-ui,Arial,sans-serif;fill:#433d38}
      .chip{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:700;fill:#14110f}
      .chipw{font-family:Futura,'Trebuchet MS','Segoe UI',sans-serif;font-weight:700;fill:#ffffff}
      .sm{font-family:ui-sans-serif,system-ui,Arial,sans-serif;fill:#433d38}
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="460" rx="16" fill="#f7f4ef"/>
  <text x="40" y="44" class="t" font-size="24">Cambridge highlights in one visit</text>
  <text x="40" y="66" class="sub" font-size="13.5">Six sights worth your time, with the one you can only reach from the water</text>

  <!-- map panel -->
  <rect x="40" y="84" width="820" height="330" rx="14" fill="#efe9e0"/>

  <!-- River Cam -->
  <path d="M120 96 q40 90 -10 160 q-44 62 30 150" fill="none" stroke="#bfe0e6" stroke-width="30" stroke-linecap="round"/>
  <path d="M120 96 q40 90 -10 160 q-44 62 30 150" fill="none" stroke="#8fc6d0" stroke-width="2" stroke-dasharray="2 10" opacity="0.7"/>

  <!-- dashed walking route -->
  <path d="M300 150 L520 175 L690 230 L640 330 L420 345 L240 300 Z" fill="none" stroke="#214f3e" stroke-width="2.5" stroke-dasharray="3 7" opacity="0.85"/>

  <!-- King's College Chapel (above route) -->
  <g>
    <rect x="288" y="118" width="24" height="22" fill="#2f6f57"/>
    <path d="M300 102 L312 118 L288 118 Z" fill="#2f6f57"/>
    <rect x="216" y="148" width="168" height="26" rx="13" fill="#ffffff" stroke="#e0d8cc"/>
    <text x="300" y="166" text-anchor="middle" class="chip" font-size="12.5">King's College Chapel</text>
  </g>

  <!-- College Backs (gold, the standout) on the river -->
  <g>
    <circle cx="115" cy="256" r="13" fill="#e8a33d"/>
    <!-- small punt icon -->
    <rect x="103" y="252" width="24" height="7" rx="3" fill="#7a4a25"/>
    <line x1="123" y1="240" x2="113" y2="258" stroke="#214f3e" stroke-width="2" stroke-linecap="round"/>
    <rect x="46" y="276" width="150" height="26" rx="13" fill="#e8a33d"/>
    <text x="121" y="294" text-anchor="middle" class="chipw" font-size="12.5">The College Backs</text>
  </g>

  <!-- Great St Mary's tower (centre) -->
  <g>
    <rect x="510" y="148" width="20" height="26" fill="#433d38"/>
    <path d="M520 134 L530 148 L510 148 Z" fill="#433d38"/>
    <rect x="448" y="180" width="150" height="26" rx="13" fill="#ffffff" stroke="#e0d8cc"/>
    <text x="523" y="198" text-anchor="middle" class="chip" font-size="12.5">Great St Mary's tower</text>
  </g>

  <!-- Fitzwilliam Museum (right upper) -->
  <g>
    <rect x="678" y="206" width="26" height="16" fill="#2f6f57"/>
    <path d="M691 196 L706 206 L676 206 Z" fill="#2f6f57"/>
    <rect x="616" y="226" width="158" height="26" rx="13" fill="#ffffff" stroke="#e0d8cc"/>
    <text x="695" y="244" text-anchor="middle" class="chip" font-size="12.5">Fitzwilliam Museum</text>
  </g>

  <!-- Botanic Garden (lower right, calm green) -->
  <g>
    <circle cx="640" cy="328" r="10" fill="#214f3e"/>
    <line x1="640" y1="328" x2="640" y2="312" stroke="#214f3e" stroke-width="2"/>
    <rect x="582" y="346" width="146" height="26" rx="13" fill="#ffffff" stroke="#e0d8cc"/>
    <text x="655" y="364" text-anchor="middle" class="chip" font-size="12.5">Botanic Garden</text>
  </g>

  <!-- Market Square (lower centre) -->
  <g>
    <rect x="412" y="330" width="20" height="20" fill="#1565ff"/>
    <rect x="346" y="356" width="150" height="26" rx="13" fill="#ffffff" stroke="#e0d8cc"/>
    <text x="421" y="374" text-anchor="middle" class="chip" font-size="12.5">Market Square</text>
  </g>

  <!-- legend -->
  <circle cx="58" cy="402" r="6" fill="#e8a33d"/>
  <text x="72" y="407" class="sm" font-size="12">gold = the one thing you can only do from the water: punting</text>
</svg>
